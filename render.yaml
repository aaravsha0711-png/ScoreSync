services:
  - type: web
    name: scoresync
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      if [ -f package.json ] && command -v npm >/dev/null 2>&1; then
        npm install
        npm run build
      fi
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: scoresync-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: scoresync-db
    plan: free
